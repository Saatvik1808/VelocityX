<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="screen-orientation" content="landscape" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>VelocityX</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root {
        width: 100%; height: 100%;
        /* dvh = dynamic viewport height — shrinks/grows with mobile address bar */
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
        background: #000;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        /* Cover iOS safe areas (notch, status bar) */
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      /* Fill behind safe areas with black */
      body { background: #000; }
      /* Prevent white flash on orientation change */
      canvas { background: #000 !important; }
      /* Landscape prompt for portrait mode */
      @media (orientation: portrait) {
        #rotate-prompt {
          display: flex !important;
        }
      }
      @media (orientation: landscape) {
        #rotate-prompt {
          display: none !important;
        }
      }
    </style>
    <script type="module" crossorigin src="/assets/index-BM_Z_1-d.js"></script>
  </head>
  <body>
    <!-- Rotate device prompt -->
    <div id="rotate-prompt" style="
      display: none;
      position: fixed; inset: 0; z-index: 99999;
      background: #000; color: #fff;
      flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    ">
      <div style="font-size: 48px; margin-bottom: 16px;">↻</div>
      <div style="font-size: 18px; font-weight: 700;">Rotate your device</div>
      <div style="font-size: 13px; opacity: 0.5; margin-top: 8px;">VelocityX plays best in landscape</div>
    </div>

    <div id="root"></div>
  </body>
</html>
